name: Notify Admin on Release

on:
  release:
    types: [published]

jobs:
  notify-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Send Notification to Admin
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.ADMIN_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🚀 *El bot se ha actualizado: ${{ github.event.release.name }}*
            
            ${{ github.event.release.body }}
            
            [Ver en GitHub](${{ github.event.release.html_url }})
            
            ---
            ⚠️ *Para enviar a todos, respondé a este mensaje con:* `/broadcast`
